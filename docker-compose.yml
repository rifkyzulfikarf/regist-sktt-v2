services:
  regist-sktt:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: regist-sktt-app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jdih_app_jdih-network

  mysql:
    image: mysql:8.3
    container_name: regist-sktt-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/dump-1503-1630.sql:/docker-entrypoint-initdb.d/001-dump.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - jdih_app_jdih-network

volumes:
  mysql-data:

networks:
  jdih_app_jdih-network:
    external: true
